name: Build iOS Simulator App

on:
  workflow_dispatch:

jobs:
  build-simulator:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'                  

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          source-url: https://nuget.pkg.github.com/YkeSmit1/index.json
        env:
          NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}     

      - name: Install MAUI workload
        run: dotnet workload install maui --version 10.0.202

      - name: Build for iOS Simulator
        run: |
          dotnet build maui.bidtrainer/maui.bidtrainer.csproj \
            -f:net9.0-ios \
            -c Release \
            /p:RuntimeIdentifier=iossimulator-x64 \
            /p:CodesignKey="" \
            /p:CodesignProvision=""

      - name: Zip .app for Appetize
        run: |
          cd maui.bidtrainer/bin/Release/net9.0-ios/iossimulator-x64
          zip -r simulator-app.zip *.app

      - name: Upload simulator app
        uses: actions/upload-artifact@v7
        with:
          name: simulator-app
          path: maui.bidtrainer/bin/Release/net9.0-ios/iossimulator-x64/simulator-app.zip
          retention-days: 5
